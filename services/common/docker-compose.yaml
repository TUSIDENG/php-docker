version: '3.8'

services:
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_HTML_DIR:-../../share/nginx/html}:/var/www/html
      - ${NGINX_LOG_DIR:-../../share/nginx/logs}:/var/log/nginx
      - ${NGINX_CONF_DIR:-../../share/nginx/conf}:/etc/nginx/conf.d
    networks:
      - php-docker
    restart: unless-stopped

  mysql:
    image: mysql:${MYSQL_VERSION:-5.7}
    container_name: mysql
    ports:
      - "3306:3306"
    volumes:
      - ${MYSQL_DATA_DIR:-../../share/mysql/data}:/var/lib/mysql
      - ${MYSQL_LOG_DIR:-../../share/mysql/logs}:/var/log/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-default}
      MYSQL_USER: ${MYSQL_USER:-dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev}
    networks:
      - php-docker
    restart: unless-stopped

  redis:
    image: redis:${REDIS_VERSION:-5-alpine}
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-../../share/redis/data}:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - php-docker
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$REDIS_PASSWORD\" ]; then
               redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\";
             else
               redis-server --appendonly yes;
             fi"

networks:
  php-docker:
    driver: bridge