version: '3.8'

services:
  php70-fpm:
    build:
      context: ./php70
      args:
        PHP_MODE: ${PHP70_MODE:-fpm}
    container_name: php70-fpm
    volumes:
      - ${PHP70_DIR:-../../share/php70}:/var/www/html
    environment:
      - PHP_MODE=${PHP70_MODE:-fpm}
    networks:
      - php-docker
    restart: unless-stopped
    expose:
      - "9000"

  php71-fpm:
    build:
      context: ./php71
      args:
        PHP_MODE: ${PHP71_MODE:-fpm}
    container_name: php71-fpm
    volumes:
      - ${PHP71_DIR:-../../share/php71}:/var/www/html
    environment:
      - PHP_MODE=${PHP71_MODE:-fpm}
    networks:
      - php-docker
    restart: unless-stopped
    expose:
      - "9000"

  php80-fpm:
    build:
      context: ./php80
      args:
        PHP_MODE: ${PHP80_MODE:-fpm}
    container_name: php80-fpm
    volumes:
      - ${PHP80_DIR:-../../share/php80}:/var/www/html
    environment:
      - PHP_MODE=${PHP80_MODE:-fpm}
    networks:
      - php-docker
    restart: unless-stopped
    expose:
      - "9000"

networks:
  php-docker:
    driver: bridge