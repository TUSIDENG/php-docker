services:
  php70-fpm:
    build:
      context: ./services/php/php70
      args:
        PHP_MODE: ${PHP70_MODE:-fpm}
    container_name: php70-fpm
    volumes:
      - ${CODE_DIR:-../}:/var/www/html
      - ./services/php/php70/php.ini:/usr/local/etc/php/php.ini
      - ./services/php/php70/www.conf:/usr/local/etc/php-fpm.d/www.conf
    environment:
      - PHP_MODE=${PHP70_MODE:-fpm}
    networks:
      - php-docker
    restart: unless-stopped
    expose:
      - "9000"

  php71-fpm:
    build:
      context: ./services/php/php71
      args:
        PHP_MODE: ${PHP71_MODE:-fpm}
    container_name: php71-fpm
    volumes:
      - ${CODE_DIR:-../}:/var/www/html
      - ./services/php/php71/php.ini:/usr/local/etc/php/php.ini
      - ./services/php/php71/www.conf:/usr/local/etc/php-fpm.d/www.conf
    environment:
      - PHP_MODE=${PHP71_MODE:-fpm}
    networks:
      - php-docker
    restart: unless-stopped
    expose:
      - "9000"

  php80-fpm:
    build:
      context: ./services/php/php80
      args:
        PHP_MODE: ${PHP80_MODE:-fpm}
    container_name: php80-fpm
    volumes:
      - ${CODE_DIR:-../}:/var/www/html
      - ./services/php/php80/php.ini:/usr/local/etc/php/php.ini
      - ./services/php/php80/www.conf:/usr/local/etc/php-fpm.d/www.conf
    environment:
      - PHP_MODE=${PHP80_MODE:-fpm}
    networks:
      - php-docker
    restart: unless-stopped
    expose:
      - "9000"

  nginx:
    build: ./services/common/nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CODE_DIR:-../}:/var/www/html
      - ./services/common/nginx/logs:/var/log/nginx
      - ./services/common/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - php-docker
    restart: unless-stopped
    depends_on:
      - php70-fpm

  mysql:
    image: mysql:${MYSQL_VERSION:-5.7}
    container_name: mysql
    ports:
      - "3306:3306"
    volumes:
      - ./services/common/mysql/data:/var/lib/mysql
      - ./services/common/mysql/logs:/var/log/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-default}
      MYSQL_USER: ${MYSQL_USER:-dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev}
    networks:
      - php-docker
    restart: unless-stopped

  redis:
    image: redis:${REDIS_VERSION:-5-alpine}
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./services/common/redis/data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - php-docker
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
               redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\";
             else
               redis-server --appendonly yes;
             fi"

  elasticvue:
    image: cars10/elasticvue
    container_name: elasticvue
    ports:
      - "8080:8080"
    networks:
      - php-docker
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.2
    container_name: kibana
    ports:
      - "5601:5601"
    networks:
      - php-docker
    restart: unless-stopped

networks:
  php-docker:
    driver: bridge
